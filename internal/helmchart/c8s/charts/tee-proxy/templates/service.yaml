apiVersion: v1
kind: Service
metadata:
  name: {{ include "tee-proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tee-proxy.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.ports.http }}
      protocol: TCP
      name: http
    - port: 443
      targetPort: {{ .Values.ports.https }}
      protocol: TCP
      name: https
  selector:
    {{- include "tee-proxy.selectorLabels" . | nindent 4 }}
