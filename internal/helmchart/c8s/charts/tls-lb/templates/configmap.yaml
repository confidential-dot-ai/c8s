{{- $san := include "tls-lb.san" . -}}
{{- include "tls-lb.validateSan" $san -}}
{{- include "tls-lb.validateProtocol" (required "protocol must be http or https" .Values.upstream.protocol) -}}
{{- include "tls-lb.validateUpstreamAddress" .Values.upstream -}}
{{- $defaultMeshCAPath := printf "%s/%s" .Values.meshCA.mountPath .Values.meshCA.key -}}
{{- $upstreamTrustedCAPath := default $defaultMeshCAPath .Values.upstream.tls.trustedCAPath -}}
{{- $upstreamServerName := default (include "tls-lb.serverNameFromAddress" .Values.upstream.address) .Values.upstream.tls.serverName -}}
{{- include "tls-lb.validateProxyTLS" (dict "protocol" .Values.upstream.protocol "tls" .Values.upstream.tls "serverName" $upstreamServerName "trustedCAPath" $upstreamTrustedCAPath "label" "tls-lb.upstream") -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tls-lb.fullname" . }}-nginx
  labels:
    {{- include "tls-lb.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent"';
        access_log /var/log/nginx/access.log main;

        sendfile on;
        keepalive_timeout 65;

        upstream backend {
            server {{ .Values.upstream.address }};
        }

        {{- range $i, $route := .Values.routes }}
        {{- if hasKey $route "upstream" }}
        {{- fail (printf "tls-lb.routes[%d].upstream is not supported; set backend.address and backend.protocol instead" $i) }}
        {{- end }}
        {{- $backend := required (printf "tls-lb.routes[%d].backend is required" $i) $route.backend }}
        {{- $backendAddress := required (printf "tls-lb.routes[%d].backend.address is required" $i) $backend.address }}
        {{- if not (regexMatch `^[^[:space:]{};/#]+$` $backendAddress) }}
        {{- fail (printf "tls-lb.routes[%d].backend.address must be a host:port address without scheme, whitespace, semicolons, braces, slashes, or '#', got: %s" $i $backendAddress) }}
        {{- end }}
        upstream route_{{ $i }} {
            server {{ $backendAddress }};
        }

        {{- end }}
        server {
            listen {{ .Values.nginx.httpsPort }} ssl;
            server_name "{{ $san }}";

            ssl_certificate     {{ include "tls-lb.publicCertPath" . }};
            ssl_certificate_key {{ include "tls-lb.publicKeyPath" . }};

            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
            ssl_prefer_server_ciphers on;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 1d;

            # Large buffers for upstream responses that include TEE attestation headers (~8KB).
            proxy_buffer_size 16k;
            proxy_buffers 4 16k;

            {{- range $i, $route := .Values.routes }}
            {{- $path := required (printf "tls-lb.routes[%d].path is required" $i) $route.path }}
            {{- $match := default "prefix" $route.match }}
            {{- if not (or (eq $match "exact") (eq $match "prefix")) }}
            {{- fail (printf "tls-lb.routes[%d].match must be 'exact' or 'prefix', got: %s" $i $match) }}
            {{- end }}
            {{- if not (regexMatch `^/[A-Za-z0-9._~!$&()*+,=:@%/-]*$` $path) }}
            {{- fail (printf "tls-lb.routes[%d].path must start with '/' and contain only URI path characters safe for nginx locations, got: %s" $i $path) }}
            {{- end }}
            {{- $backend := required (printf "tls-lb.routes[%d].backend is required" $i) $route.backend }}
            {{- $backendAddress := required (printf "tls-lb.routes[%d].backend.address is required" $i) $backend.address }}
            {{- $backendProtocol := default "http" $backend.protocol }}
            {{- if not (or (eq $backendProtocol "http") (eq $backendProtocol "https")) }}
            {{- fail (printf "tls-lb.routes[%d].backend.protocol must be 'http' or 'https', got: %s" $i $backendProtocol) }}
            {{- end }}
            {{- if not (regexMatch `^[^[:space:]{};/#]+$` $backendAddress) }}
            {{- fail (printf "tls-lb.routes[%d].backend.address must be a host:port address without scheme, whitespace, semicolons, braces, slashes, or '#', got: %s" $i $backendAddress) }}
            {{- end }}
            {{- $backendTLS := default dict $backend.tls }}
            {{- $backendTrustedCAPath := default $defaultMeshCAPath $backendTLS.trustedCAPath }}
            {{- $backendServerName := default (include "tls-lb.serverNameFromAddress" $backendAddress) $backendTLS.serverName }}
            {{- include "tls-lb.validateProxyTLS" (dict "protocol" $backendProtocol "tls" $backendTLS "serverName" $backendServerName "trustedCAPath" $backendTrustedCAPath "label" (printf "tls-lb.routes[%d].backend" $i)) }}
            {{- if and (ne $backendProtocol "https") (or (default false $backendTLS.verify) (default false $backendTLS.useCDSClientCert)) }}
            {{- fail (printf "tls-lb.routes[%d].backend.tls.verify and useCDSClientCert require backend.protocol: https" $i) }}
            {{- end }}
            # Route: {{ $path }} -> {{ $backendProtocol }}://{{ $backendAddress }}
            {{- if eq $match "exact" }}
            location = {{ $path }} {
            {{- else }}
            location {{ $path }} {
            {{- end }}
                {{- if eq $backendProtocol "https" }}
                {{- include "tls-lb.proxySSLDirectives" (dict "protocol" $backendProtocol "tls" $backendTLS "serverName" $backendServerName "trustedCAPath" $backendTrustedCAPath "tlsMountPath" $.Values.tlsMountPath) | nindent 16 }}
                {{- end }}
                proxy_pass {{ $backendProtocol }}://route_{{ $i }};
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            {{- end }}
            {{- if .Values.discovery.enabled }}
            location = {{ .Values.discovery.path }} {
                access_log off;
                default_type application/json;
                add_header Cache-Control "no-store" always;
                alias {{ include "tls-lb.discoveryFilePath" . }};
            }

            location = {{ .Values.discovery.cdsCertPath }} {
                access_log off;
                default_type application/x-pem-file;
                add_header Cache-Control "no-store" always;
                alias {{ .Values.tlsMountPath }}/cert.pem;
            }

            {{- if .Values.meshCA.expose }}
            location = {{ .Values.discovery.meshCAPath }} {
                access_log off;
                default_type application/x-pem-file;
                add_header Cache-Control "no-store" always;
                alias {{ $defaultMeshCAPath }};
            }
            {{- end }}

            {{- end }}
            location / {
                {{- if eq .Values.upstream.protocol "https" }}
                {{- include "tls-lb.proxySSLDirectives" (dict "protocol" .Values.upstream.protocol "tls" .Values.upstream.tls "serverName" $upstreamServerName "trustedCAPath" $upstreamTrustedCAPath "tlsMountPath" .Values.tlsMountPath) | nindent 16 }}
                {{- end }}
                proxy_pass {{ .Values.upstream.protocol }}://backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /healthz {
                access_log off;
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }
        }
    }
