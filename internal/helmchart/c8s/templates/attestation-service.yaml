{{- if .Values.attestationService.enabled -}}
{{- /*
  Resolve the api_key: explicit value > existing Secret > freshly generated.
  Additional workload namespace keys are generated per namespace and added
  to the attestation-service allowlist so one leaked workload Secret is not
  the cluster-wide chart key.
*/ -}}
{{- $root := . -}}
{{- $apiKeySecretName := printf "%s-api-key" (include "c8s.attestationServiceName" .) -}}
{{- $workloadAPIKeySecretName := include "c8s.workloadAPIKeySecretName" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $apiKeySecretName) -}}
{{- $apiKey := .Values.attestationService.apiKey -}}
{{- if and (not $apiKey) $existing $existing.data.apiKey -}}
  {{- $apiKey = (b64dec $existing.data.apiKey) -}}
{{- end -}}
{{- if not $apiKey -}}
  {{- $apiKey = randAlphaNum 32 -}}
{{- end -}}
{{- $authKeys := list $apiKey -}}
{{- $workloadKeys := dict -}}
{{- range $ns := .Values.webhook.apiKeySecret.createInNamespaces -}}
  {{- $reuseReleaseSecret := and (eq $ns $root.Release.Namespace) (eq $workloadAPIKeySecretName $apiKeySecretName) -}}
  {{- $existingWorkloadSecret := (lookup "v1" "Secret" $ns $workloadAPIKeySecretName) -}}
  {{- $workloadKey := "" -}}
  {{- if $reuseReleaseSecret -}}
    {{- $workloadKey = $apiKey -}}
  {{- else if and $existingWorkloadSecret (index $existingWorkloadSecret.data $root.Values.webhook.apiKeySecret.key) -}}
    {{- $workloadKey = (b64dec (index $existingWorkloadSecret.data $root.Values.webhook.apiKeySecret.key)) -}}
  {{- else -}}
    {{- $workloadKey = randAlphaNum 32 -}}
  {{- end -}}
  {{- $_ := set $workloadKeys $ns $workloadKey -}}
  {{- $authKeys = append $authKeys $workloadKey -}}
{{- end -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $apiKeySecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
type: Opaque
stringData:
  apiKey: {{ $apiKey | quote }}
{{- range $ns := .Values.webhook.apiKeySecret.createInNamespaces }}
{{- $reuseReleaseSecret := and (eq $ns $root.Release.Namespace) (eq $workloadAPIKeySecretName $apiKeySecretName) }}
{{- if not $reuseReleaseSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $workloadAPIKeySecretName }}
  namespace: {{ $ns }}
  labels:
{{ include "c8s.commonLabels" $root | indent 4 }}
    app.kubernetes.io/component: workload-auth
type: Opaque
stringData:
  {{ $root.Values.webhook.apiKeySecret.key }}: {{ index $workloadKeys $ns | quote }}
{{- end }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
data:
  config.toml: |
    [server]
    bind = "0.0.0.0:{{ .Values.attestationService.port }}"
    # hosted mode: loopback guard is off; api_key auth gates protected
    # endpoints (/attest, /verify, ...). /health remains public so kubelet
    # probes succeed without an auth header.
    mode = "hosted"

    [server.tls]
    enabled = false

    [auth]
    api_keys = [{{- range $i, $key := $authKeys -}}
      {{- if $i }}, {{ end -}}{{- $key | quote -}}
    {{- end -}}]

    [attestation]
    enabled = true
    platforms = [{{- range $i, $p := .Values.attestationService.platforms -}}
      {{- if $i }}, {{ end -}}{{- $p | quote -}}
    {{- end -}}]

    [certs]
    cache_max_entries = 1024
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
spec:
  selector:
    app.kubernetes.io/name: c8s-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: attestation-service
  # Local: pods always hit their same-node attestation-service replica.
  # /attest generates evidence for the LOCAL TEE, so a cross-node hop
  # would produce evidence against the wrong node.
  internalTrafficPolicy: Local
  ports:
    - name: http
      port: {{ .Values.attestationService.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "c8s.attestationServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "c8s.commonLabels" . | indent 4 }}
    app.kubernetes.io/component: attestation-service
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: c8s-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: attestation-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c8s-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: attestation-service
    spec:
      serviceAccountName: {{ include "c8s.attestationServiceName" . }}
      tolerations:
        - operator: Exists
      containers:
        - name: attestation-service
          image: {{ include "c8s.attestationServiceImage" . }}
          imagePullPolicy: {{ .Values.attestationService.image.pullPolicy }}
          args: [--config, /etc/attestation-service/config.toml]
          ports:
            - name: http
              containerPort: {{ .Values.attestationService.port }}
          securityContext:
            # Not privileged — only the TEE device nodes are mounted
            # below, not all of /dev. SYS_RAWIO covers the ioctl access
            # the attestation crate needs against /dev/sev-guest and
            # /dev/tdx-guest; everything else is dropped.
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [SYS_RAWIO]
          volumeMounts:
            - name: config
              mountPath: /etc/attestation-service
              readOnly: true
            {{- if .Values.attestationService.teeDevices.sevGuest }}
            - name: sev-guest
              mountPath: /dev/sev-guest
            {{- end }}
            {{- if .Values.attestationService.teeDevices.tdxGuest }}
            - name: tdx-guest
              mountPath: /dev/tdx-guest
            {{- end }}
            {{- if .Values.attestationService.teeDevices.tpm }}
            - name: tpm
              mountPath: /dev/tpm0
            - name: tpmrm
              mountPath: /dev/tpmrm0
            {{- end }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 2
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
          resources:
{{ toYaml .Values.attestationService.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "c8s.attestationServiceName" . }}
        # hostPath.type=CharDevice forces a hard failure on nodes that
        # lack the device, instead of silently mounting an empty file —
        # attestation evidence would then be silently bogus. Toggle each
        # device individually based on the host hardware shape.
        {{- if .Values.attestationService.teeDevices.sevGuest }}
        - name: sev-guest
          hostPath:
            path: /dev/sev-guest
            type: CharDevice
        {{- end }}
        {{- if .Values.attestationService.teeDevices.tdxGuest }}
        - name: tdx-guest
          hostPath:
            path: /dev/tdx-guest
            type: CharDevice
        {{- end }}
        {{- if .Values.attestationService.teeDevices.tpm }}
        - name: tpm
          hostPath:
            path: /dev/tpm0
            type: CharDevice
        - name: tpmrm
          hostPath:
            path: /dev/tpmrm0
            type: CharDevice
        {{- end }}
{{- end }}
