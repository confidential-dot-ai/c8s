{{- $tlsLB := .Values.tlsLb -}}
{{- $teeProxy := .Values.teeProxy -}}
{{- $nri := .Values.nriImagePolicy -}}
{{- $nriCDSURL := tpl (default "" $nri.cds.url) . -}}
{{- $attestationNodePort := int .Values.attestationService.service.nodePort -}}
{{- if and $tlsLB.enabled $teeProxy.enabled (eq $tlsLB.upstream.protocol "https") (eq $tlsLB.upstream.address "c8s-tee-proxy:443") (not (or $teeProxy.tls.enabled $teeProxy.domain)) -}}
{{- fail "tlsLb.upstream.protocol=https with the chart-managed tee-proxy requires teeProxy.tls.enabled=true or teeProxy.domain to enable the HTTPS listener" -}}
{{- end -}}
{{- if and .Values.kata.enforce.enabled (not .Values.kata.enabled) -}}
{{- fail "kata.enforce.enabled=true requires kata.enabled=true: enforcement injects and validates the kata RuntimeClasses that kata.enabled installs" -}}
{{- end -}}
{{- if and .Values.kata.enforce.enabled (ne .Values.webhook.failurePolicy "Fail") -}}
{{- fail (printf "kata.enforce.enabled=true requires webhook.failurePolicy=Fail (got %q): the ValidatingAdmissionPolicy rejects pods that reach validation without a kata RuntimeClass, so the mutating webhook that injects that class must also fail closed — otherwise an operator-down event silently bypasses enforcement" .Values.webhook.failurePolicy) -}}
{{- end -}}
{{- if and $nri.enabled (not (hasPrefix "https://" $nriCDSURL)) -}}
{{- fail (printf "nriImagePolicy.cds.url must start with https:// when nriImagePolicy.enabled=true (got %q): the host plugin must fetch the whitelist over RA-TLS" $nriCDSURL) -}}
{{- end -}}
{{- if and $nri.enabled (or (lt $attestationNodePort 30000) (gt $attestationNodePort 32767)) -}}
{{- fail (printf "attestationService.service.nodePort must be within the Kubernetes NodePort range 30000-32767 when nriImagePolicy.enabled=true (got %d)" $attestationNodePort) -}}
{{- end -}}
