{{- $tlsLB := index .Values "tls-lb" -}}
{{- $teeProxy := index .Values "tee-proxy" -}}
{{- if and $tlsLB.enabled $teeProxy.enabled (eq $tlsLB.upstream.protocol "https") (eq $tlsLB.upstream.address "c8s-tee-proxy:443") (not (or $teeProxy.tls.enabled $teeProxy.domain)) -}}
{{- fail "tls-lb.upstream.protocol=https with the chart-managed tee-proxy requires tee-proxy.tls.enabled=true or tee-proxy.domain to enable the HTTPS listener" -}}
{{- end -}}
