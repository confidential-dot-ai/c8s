---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: trustdomains.confidential.ai
spec:
  group: confidential.ai
  names:
    kind: TrustDomain
    listKind: TrustDomainList
    plural: trustdomains
    shortNames:
    - td
    singular: trustdomain
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.attestationServiceReachable
      name: Attest
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          TrustDomain is an optional cluster-scoped CR that overrides the default
          attestation-service wiring shipped by the helm chart.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TrustDomainSpec is the desired state of a TrustDomain.

              All fields are optional. Without a TrustDomain CR pods talk to the default
              attestation Service shipped by the helm chart. CA material is intentionally
              not part of this spec: a Kubernetes Secret is readable by the operator and
              any cluster-admin, so a TrustDomain CR cannot make claims about CA
              confidentiality. TEE-sealed CA bootstrap is tracked in docs/GAPS.md.
            properties:
              attestationServiceRef:
                description: |-
                  AttestationServiceRef points at the assam Service that pods talk to for
                  challenge / attest / cert issuance. The TrustDomain controller probes
                  reachability and surfaces it on .status.
                properties:
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    minLength: 1
                    type: string
                required:
                - name
                - namespace
                type: object
              leafDefaults:
                description: |-
                  LeafDefaultsSpec sets defaults applied by cert-issuer to leaf certificates
                  issued under this TrustDomain.
                properties:
                  ttl:
                    description: TTL is the issued leaf certificate lifetime. Default
                      24h.
                    type: string
                type: object
            type: object
          status:
            description: |-
              TrustDomainStatus is the observed state of a TrustDomain. Status-mirror
              only — nothing in the cluster gates on these fields.
            properties:
              attestationServiceReachable:
                description: AttestationServiceReachable is the result of the last
                  probe.
                type: boolean
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
