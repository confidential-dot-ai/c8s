name: Chart

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*"]
    paths: &chart-paths
      - "internal/helmchart/**"
      - ".github/workflows/chart.yml"
  pull_request:
    branches: [main, "feat/**"]
    paths: *chart-paths

env:
  REGISTRY: ghcr.io
  CHART_REPO: ghcr.io/lunal-dev/charts
  CHART_DIR: internal/helmchart/c8s

jobs:
  package:
    name: Lint, package & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.14.4

      - name: Determine chart version
        id: ver
        run: .github/scripts/chart-version.sh

      - name: Lint & template chart
        run: .github/scripts/chart-verify.sh

      - name: Helm package
        run: |
          mkdir -p dist
          helm package "$CHART_DIR" \
            --version "${{ steps.ver.outputs.version }}" \
            --app-version "${{ steps.ver.outputs.version }}" \
            -d dist/

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Helm push
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          helm push "dist/c8s-${{ steps.ver.outputs.version }}.tgz" \
            "oci://$CHART_REPO"
