name: Kernel config snapshot

# Builds steep's hardened guest kernel with c8s's container.config fragment and
# publishes the resolved-config snapshot (steep's required+hardening baseline +
# the fragment, merged) as a downloadable artifact. This is the KERNEL HALF of
# the kata-guest-base build, decoupled: no osbuilder, no fetch.sh, no Docker /
# allowlist dependency — so it runs on ANY commit, unlike kata-guest-base.yml
# (which is chained behind the Docker workflow and only fires when Docker does).
#
# Two entrypoints:
#   workflow_dispatch — pull the snapshot for a commit on demand (e.g. to seed
#                       or refresh kata-guest-base/kernel/config-x86_64.snapshot).
#   workflow_call     — reuse from another workflow: the planned snapshot drift
#                       gate calls this, diffs the artifact against the committed
#                       lockfile, and fails on drift.
#
# DUPLICATION (deliberate, temporary): the steep setup + cache steps below
# mirror kata-guest-base.yml. The two SHARE cache keys (steep build, mkosi
# tools tree, the kata-kernel-v3 kernel cache), so a run here warms the cache
# kata-guest-base uses and vice-versa. The end state is kata-guest-base.yml
# calling this workflow for its kernel (vmlinuz as an artifact + SKIP_KERNEL=1),
# which removes the duplication — deferred to its own PR so the production
# measured-boot image build isn't refactored here.

on:
  workflow_dispatch:
    inputs:
      steep_ref:
        description: steep commit/ref to build the kernel from (default = pinned)
        required: false
        type: string
        default: "4b731634be9ae6a592f082a2501f8de95f3600ce"
  workflow_call:
    inputs:
      steep_ref:
        description: steep commit/ref to build the kernel from
        required: false
        type: string
        default: "4b731634be9ae6a592f082a2501f8de95f3600ce"
    secrets:
      STEEP_REPO_TOKEN:
        description: token with read access to confidential-dot-ai/steep (falls back to github.token)
        required: false
    outputs:
      snapshot_sha256:
        description: sha256 of the resolved kernel-config snapshot
        value: ${{ jobs.kernel.outputs.snapshot_sha256 }}

permissions:
  contents: read

env:
  # steep ref — keep the default in lockstep with kata-guest-base.yml's
  # STEEP_REF until the two share this workflow. Overridable per call/dispatch.
  STEEP_REF: ${{ inputs.steep_ref }}

jobs:
  kernel:
    name: Build steep kernel + snapshot
    # Same self-hosted SEV-SNP host as kata-guest-base.yml: `steep kernel` runs
    # mkosi/nspawn under sudo for the kernel-builder sandbox, which can't run on
    # a user-namespaced GitHub-hosted runner.
    runs-on: the-machine
    outputs:
      snapshot_sha256: ${{ steps.snapshot.outputs.sha256 }}
    steps:
      # c8s -> ./c8s and steep -> ./steep, mirroring kata-guest-base.yml so the
      # cache keys (which hashFiles these paths) match byte-for-byte.
      - name: Checkout c8s
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: c8s

      - name: Checkout steep
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: confidential-dot-ai/steep
          ref: ${{ env.STEEP_REF }}
          path: steep
          token: ${{ secrets.STEEP_REPO_TOKEN || github.token }}

      # --- steep kernel-builder sandbox deps (mirror kata-guest-base.yml) ----
      - name: Setup uv (mkosi v26 toolchain)
        uses: astral-sh/setup-uv@b75a909f75acd358c2196fb9a5f1299a9a8868a4 # v6.7.0

      - name: Setup mkosi
        # Keep in lockstep with steep/.github/workflows/base.yml + kata-guest-base.yml.
        uses: systemd/mkosi@84af20892b61c8e177e391f997ded8b4cb5514f2 # v26

      - name: Install systemd-container (mkosi sandbox dep)
        run: sudo apt-get update && sudo apt-get install -y systemd-container

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@9d7e65c320fdb52dcd45ffaa68deb6c02c8754d9 # v1.12.0

      # --- steep binary (shared cache with kata-guest-base.yml) --------------
      - name: Restore steep build
        id: steep-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: steep/target/release/steep
          key: ${{ runner.os }}-steep-${{ hashFiles('steep/Cargo.lock', 'steep/src/**', 'steep/crates/**') }}

      - name: Build steep
        id: build-steep
        if: steps.steep-cache.outputs.cache-hit != 'true'
        working-directory: steep
        run: cargo build --release

      - name: Save steep build
        if: steps.steep-cache.outputs.cache-hit != 'true' && steps.build-steep.outcome == 'success'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: steep/target/release/steep
          key: ${{ steps.steep-cache.outputs.cache-primary-key }}

      # --- mkosi kernel-builder tools tree (shared cache; the 58-min part) ---
      # Hit here means Step 0a short-circuits (steep checks its .steep-tools-stamp
      # against the mkosi.conf hash). See kata-guest-base.yml for the full rationale.
      - name: Restore kernel-builder tools tree
        id: tools-tree-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/steep-tools-tree.tar.zst
          key: ${{ runner.os }}-steep-tools-tree-mkosi-v26-${{ hashFiles('steep/mkosi/kernel-builder/mkosi.conf') }}

      - name: Unpack kernel-builder tools tree
        if: steps.tools-tree-cache.outputs.cache-hit == 'true'
        run: |
          sudo tar --zstd --numeric-owner --xattrs --xattrs-include='*' \
            -xpf "${RUNNER_TEMP}/steep-tools-tree.tar.zst" \
            -C steep/mkosi/kernel-builder

      # --- guest kernel output (shared kata-kernel-v3 cache) ----------------
      - name: Restore guest kernel build
        id: kernel-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            steep/output/kernel
            steep/kernel/config-x86_64.snapshot
          key: ${{ runner.os }}-kata-kernel-v3-${{ env.STEEP_REF }}-${{ hashFiles('c8s/kata-guest-base/kernel/container.config') }}
          restore-keys: |
            ${{ runner.os }}-kata-kernel-v3-${{ env.STEEP_REF }}-

      # Resolve + compile the kernel and capture the snapshot. Mirrors
      # build.sh Step 1 (`cd steep && steep kernel --kernel-config-fragment
      # <c8s fragment>`), then copies steep's resolved snapshot to the in-repo
      # path build.sh writes it to, so the uploaded artifact is identical to
      # what a full kata-guest-base build would commit. steep escalates to sudo
      # internally for mkosi/nspawn, exactly as under build.sh.
      - name: Build steep kernel + capture snapshot
        id: snapshot
        run: |
          set -euo pipefail
          frag="${GITHUB_WORKSPACE}/c8s/kata-guest-base/kernel/container.config"
          [[ -f "${frag}" ]] || { echo "::error::kernel fragment missing: ${frag}"; exit 1; }
          [[ -x steep/target/release/steep ]] || { echo "::error::steep binary missing"; exit 1; }
          ( cd steep && ./target/release/steep kernel --kernel-config-fragment "${frag}" )
          src="steep/kernel/config-x86_64.snapshot"
          [[ -f "${src}" ]] || { echo "::error::steep did not write ${src}"; exit 1; }
          dest="c8s/kata-guest-base/kernel/config-x86_64.snapshot"
          install -m 0644 "${src}" "${dest}"
          sha="$(sha256sum "${dest}" | awk '{print $1}')"
          echo "sha256=${sha}" >> "${GITHUB_OUTPUT}"
          echo "resolved kernel-config snapshot sha256: ${sha}"

      - name: Upload kernel-config snapshot
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: config-x86_64.snapshot
          path: c8s/kata-guest-base/kernel/config-x86_64.snapshot
          if-no-files-found: error

      # --- bank the caches (shared keys + the completeness guard) ------------
      - name: Pack kernel-builder tools tree
        id: tools-tree-tar
        if: always() && steps.tools-tree-cache.outputs.cache-hit != 'true'
        run: |
          if [[ -f steep/mkosi/kernel-builder/mkosi.output/.steep-tools-stamp ]]; then
            sudo tar --zstd --numeric-owner --xattrs --xattrs-include='*' \
              -cpf "${RUNNER_TEMP}/steep-tools-tree.tar.zst" \
              -C steep/mkosi/kernel-builder mkosi.output
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Save kernel-builder tools tree
        if: always() && steps.tools-tree-cache.outputs.cache-hit != 'true' && steps.tools-tree-tar.outputs.exists == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}/steep-tools-tree.tar.zst
          key: ${{ steps.tools-tree-cache.outputs.cache-primary-key }}

      # Same completeness guard as kata-guest-base.yml: never bank a kernel
      # cache without vmlinuz + manifest, or it poisons the shared key.
      - name: Check guest kernel output
        id: kernel-out
        if: always()
        run: |
          if [[ -f steep/output/kernel/vmlinuz && -f steep/output/kernel/manifest.json ]]; then
            echo "complete=true" >> "${GITHUB_OUTPUT}"
          else
            echo "complete=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Save guest kernel build
        if: always() && steps.kernel-cache.outputs.cache-hit != 'true' && steps.kernel-out.outputs.complete == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            steep/output/kernel
            steep/kernel/config-x86_64.snapshot
          key: ${{ runner.os }}-kata-kernel-v3-${{ env.STEEP_REF }}-${{ hashFiles('c8s/kata-guest-base/kernel/container.config') }}
