name: cla

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA gate
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event.issue.pull_request &&
       (contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA') ||
        contains(github.event.comment.body, 'recheck')))
    # Runs on pull_request_target with write permissions — never check out PR code here.
    steps:
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: https://github.com/confidential-dot-ai/c8s/blob/main/CONTRIBUTING.md#terms
          path-to-signatures: signatures/cla.json
          branch: cla-signatures
          allowlist: '*[bot]'
