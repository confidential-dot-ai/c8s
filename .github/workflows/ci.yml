name: CI

on:
  push:
    branches: [main, "feat/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26.1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Check formatting
        run: make fmt

      - name: Vet
        run: make vet

  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: make test
