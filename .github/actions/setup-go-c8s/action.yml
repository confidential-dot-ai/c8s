name: Set up Go toolchain (c8s)
description: >-
  Configure the Go toolchain with module caching. The toolchain is derived from
  the module's `go` directive (go.mod) — a single source of truth, with no
  GO_VERSION pin to drift against go.mod or between workflows. go.mod declares
  the minor only (go 1.26), so this floats to the latest 1.26.x patch.

  Run this AFTER actions/checkout: a local (./) composite action cannot perform
  the checkout itself, because the action file must already be on disk before
  `uses:` can resolve it.

inputs:
  go-version-file:
    description: Path to the go.mod whose `go` directive selects the toolchain.
    default: go.mod
  cache-dependency-path:
    description: Path to go.sum used to key the module cache.
    default: go.sum

runs:
  using: composite
  steps:
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ inputs.go-version-file }}
        cache: true
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
