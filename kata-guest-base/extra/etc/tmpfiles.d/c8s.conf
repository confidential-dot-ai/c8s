# systemd-tmpfiles applied early at boot by systemd-tmpfiles-setup.service.
#
# Creates /run/c8s/ as root:root 0755 before c8s-cloudinit-env.service
# runs. Without this the EnvironmentFile= directive in
# ratls-mesh.service would race the script's mkdir on tmpfs and the
# unit might start with a missing env file on first boot.
#
# Format: Type Path Mode User Group Age Argument
d /run/c8s 0755 root root - -

# In-guest registry auth for guest-pull. The kata-agent reads
# `agent.image_registry_auth=file:///run/image-security/auth.json` off the
# guest kernel cmdline (the puller appends it from
# kata.guestImage.registryAuth) and hands the file to the in-guest
# CDH/image-rs so it can authenticate guest-pulls against a registry that
# requires it (e.g. a private mirror; empty auths in stock builds). /run is
# tmpfs, so the file cannot simply live in the rootfs at that path; we
# materialise it here from the dm-verity-baked /etc/c8s/ghcr-auth.json
# (covered by the SNP launch measurement). This runs at
# systemd-tmpfiles-setup (sysinit.target, pulled in by basic.target ->
# kata-containers.target) — i.e. before kata-agent.service and any
# CreateContainer/guest-pull. `C` only copies when the dest is absent, so a
# trusted in-guest component could still overwrite it later if needed.
d /run/image-security 0700 root root - -
C /run/image-security/auth.json 0600 root root - /etc/c8s/ghcr-auth.json
