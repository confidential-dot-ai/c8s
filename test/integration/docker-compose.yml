services:
  mock-attestation:
    build:
      context: ../mock-attestation
    environment:
      PORT: "8400"

  mock-cds:
    build:
      context: ../mock-cds
    environment:
      PORT: "8080"
    depends_on:
      - mock-attestation

  # A simple backend that the nginx proxy forwards to.
  backend:
    image: nginx:1.27-alpine
    # Default nginx serves a welcome page on port 80.

  get-cert:
    build:
      # cmd/get-cert/Dockerfile COPYs build/c8s, so the context must be the
      # repo root and `make build` must have run first.
      context: ../..
      dockerfile: cmd/get-cert/Dockerfile
    command:
      - --cds-url=http://mock-cds:8080
      - --attestation-api-url=http://mock-attestation:8400
      - --san=nginx-lb
      - --out=/tls/cert.pem
      - --key-out=/tls/key.pem
      - --verbose
    volumes:
      - tls-certs:/tls
    depends_on:
      - mock-cds
      - mock-attestation

  nginx-lb:
    image: nginx:1.27-alpine
    ports:
      - "8443:443"
    volumes:
      - tls-certs:/tls:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      get-cert:
        condition: service_completed_successfully
      backend:
        condition: service_started

volumes:
  tls-certs:
